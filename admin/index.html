<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>AES Content Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --sidebar: #1a1d2e; --cyan: #12d4e0; --cyan2: #0088b8;
      --text: #e2e8f0; --muted: #94a3b8; --border: rgba(255,255,255,.08);
      --content-bg: #f0f2f5;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ── LOGIN ── */
    #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
    .login-card { background: var(--sidebar); border-radius: 16px; padding: 48px 40px 36px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.35); border: 1px solid var(--border); }
    .login-logo { height: 52px; width: auto; margin: 0 auto 24px; display: block; }
    .login-card h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .login-card p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-input { width: 100%; padding: 11px 14px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 10px; outline: none; transition: border-color .15s; }
    .login-input:focus { border-color: var(--cyan); }
    .login-input::placeholder { color: var(--muted); }
    .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--cyan), var(--cyan2)); color: #fff; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s; }
    .login-btn:hover { opacity: .9; }
    .login-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .login-footer { margin-top: 28px; font-size: 12px; color: rgba(148,163,184,.35); }

    /* ── EDITOR LAYOUT ── */
    #editor { display: flex; height: 100vh; overflow: hidden; }

    /* ── SIDEBAR ── */
    #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; height: 100%; border-right: 1px solid var(--border); flex-shrink: 0; }
    .sb-header { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .sb-logo { height: 28px; width: auto; }
    .sb-title { font-size: 13px; font-weight: 700; color: #fff; }
    #nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-group { margin-bottom: 4px; }
    .nav-group-label { padding: 10px 20px 4px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(148,163,184,.5); }
    .nav-btn { display: block; width: 100%; text-align: left; padding: 8px 20px; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; transition: background .12s, color .12s; }
    .nav-btn:hover { background: rgba(255,255,255,.05); color: #fff; }
    .nav-btn.active { background: rgba(18,212,224,.1); color: var(--cyan); }
    .sb-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .logout-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 6px 0; width: 100%; }
    .logout-btn:hover { color: #ef4444; }
    .sb-version { font-size: 11px; color: rgba(148,163,184,.2); margin-top: 6px; }

    /* ── MAIN ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { height: 60px; background: var(--sidebar); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #section-title { font-size: 16px; font-weight: 600; color: #fff; }
    .pub-btn { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--cyan), var(--cyan2)); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .pub-btn:hover { opacity: .88; }
    .pub-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── CONTENT ── */
    #content-area { flex: 1; overflow-y: auto; background: var(--content-bg); }
    #welcome { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 15px; color: #94a3b8; text-align: center; padding: 40px; }
    #fields { padding: 32px; max-width: 780px; display: none; }
    .field-section-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; }
    .field-group { margin-bottom: 22px; }
    .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #64748b; margin-bottom: 6px; }
    .field-hint { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .field-input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 14px; color: #1e293b; background: #fff; outline: none; font-family: inherit; transition: border-color .15s; }
    .field-input:focus { border-color: var(--cyan); }
    textarea.field-input { resize: vertical; min-height: 80px; }

    /* ── LIST WIDGET ── */
    .list-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .list-row .field-input { flex: 1; }
    .list-remove { padding: 0 10px; background: none; border: 1.5px solid #fca5a5; color: #ef4444; border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; }
    .list-remove:hover { background: #fef2f2; }
    .list-add { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; background: none; border: 1.5px dashed #cbd5e1; border-radius: 6px; color: #64748b; font-size: 13px; cursor: pointer; margin-top: 4px; }
    .list-add:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ── TOAST ── */
    #toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,.15); opacity: 0; transform: translateY(8px); transition: all .2s; }
    .toast.show { opacity: 1; transform: none; }
    .toast-success { background: #22c55e; color: #fff; }
    .toast-error   { background: #ef4444; color: #fff; }
    .toast-info    { background: #3b82f6; color: #fff; }
  </style>
</head>
<body>

<!-- EDITOR -->
<div id="editor" style="display:none">
  <aside id="sidebar">

        Logout

  <div id="main">

// ─── STATE ───────────────────────────────────────────────────────────────────
var _data    = {};
var _section = null;

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function lsGet(k)    { try { return localStorage.getItem(k);  } catch(e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v);      } catch(e) {} }
function lsRm(k)     { try { localStorage.removeItem(k);      } catch(e) {} }

// ─── DEEP GET / SET ───────────────────────────────────────────────────────────
function dGet(obj, path) {
  return path.split('.').reduce(function(o, k) { return (o != null) ? o[k] : undefined; }, obj);
}
function dSet(obj, path, val) {
  var keys = path.split('.');
  var last = keys.pop();
  var node = keys.reduce(function(o, k, i) {
    var nextKey = keys[i + 1] !== undefined ? keys[i + 1] : last;
    if (o[k] == null || typeof o[k] !== 'object') o[k] = isNaN(Number(nextKey)) ? {} : [];
    return o[k];
  }, obj);
  node[last] = val;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin() {
  var pw  = document.getElementById('pw');
  var err = document.getElementById('login-error');
  if (pw.value === PASS) {
    lsSet('aes_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('editor').style.display       = 'flex';
    startEditor();
  } else {
    err.textContent = 'Incorrect password — try again';
    pw.value = '';
    pw.focus();
    setTimeout(function() { err.textContent = ''; }, 3000);
  }
}

function doLogout() {
  lsRm('aes_auth');
  document.getElementById('editor').style.display       = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw').value = '';
}

// ─── EDITOR START ─────────────────────────────────────────────────────────────
function startEditor() {
  var stored = lsGet('aes_content');
  if (stored) {
    try { _data = JSON.parse(stored); } catch(e) { _data = {}; }
    buildNav();
    return;
  }
  fetch('../content.json')
    .then(function(r) { return r.ok ? r.json() : {}; })
    .catch(function()  { return {}; })
    .then(function(data) { _data = data; buildNav(); });
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = '';
  SCHEMA.forEach(function(group) {
    var g = document.createElement('div');
    g.className = 'nav-group';
    var lbl = document.createElement('div');
    lbl.className = 'nav-group-label';
    lbl.textContent = group.group;
    g.appendChild(lbl);
    group.sections.forEach(function(sec) {
      var b = document.createElement('button');
      b.className = 'nav-btn';
      b.innerHTML = sec.label;
      b.dataset.id = sec.id;
      b.addEventListener('click', function() { openSection(sec); });
      g.appendChild(b);
    });
    nav.appendChild(g);
  });
}

// ─── SECTION ─────────────────────────────────────────────────────────────────
function openSection(sec) {
  _section = sec;
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.id === sec.id);
  });
  document.getElementById('section-title').innerHTML = sec.label;
  document.getElementById('welcome').style.display = 'none';
  var f = document.getElementById('fields');
  f.style.display = 'block';
  renderFields(sec);
}

function renderFields(sec) {
  var container = document.getElementById('fields');
  container.innerHTML = '<div class="field-section-title">' + sec.label + '</div>';
  sec.fields.forEach(function(f) {
    var group = document.createElement('div');
    group.className = 'field-group';
    var lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = f.label;
    group.appendChild(lbl);
    if (f.hint) {
      var hint = document.createElement('p');
      hint.className = 'field-hint';
      hint.textContent = f.hint;
      group.appendChild(hint);
    }
    if (f.type === 'list') {
      group.appendChild(makeList(f.key));
    } else if (f.type === 'token') {
      var inp = document.createElement('input');
      inp.type = 'password';
      inp.className = 'field-input';
      inp.value = lsGet('aes_token') || '';
      inp.autocomplete = 'new-password';
      inp.addEventListener('input', function() { lsSet('aes_token', inp.value); });
      group.appendChild(inp);
    } else if (f.type === 'textarea') {
      var ta = document.createElement('textarea');
      ta.className = 'field-input';
      ta.rows = 4;
      ta.value = dGet(_data, f.key) || '';
      ta.addEventListener('input', function() { dSet(_data, f.key, ta.value); });
      group.appendChild(ta);
    } else {
      var inp2 = document.createElement('input');
      inp2.type = 'text';
      inp2.className = 'field-input';
      inp2.value = dGet(_data, f.key) || '';
      inp2.addEventListener('input', function() { dSet(_data, f.key, inp2.value); });
      group.appendChild(inp2);
    }
    container.appendChild(group);
  });
}

function makeList(key) {
  var arr = dGet(_data, key);
  if (!Array.isArray(arr)) { arr = []; dSet(_data, key, arr); }
  var wrap = document.createElement('div');
  function redraw() {
    wrap.innerHTML = '';
    arr.forEach(function(item, i) {
      var row = document.createElement('div');
      row.className = 'list-row';
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'field-input';
      inp.value = item;
      inp.addEventListener('input', function() { arr[i] = inp.value; });
      var rm = document.createElement('button');
      rm.type = 'button';
      rm.className = 'list-remove';
      rm.textContent = '\u00d7';
      rm.addEventListener('click', function() { arr.splice(i, 1); redraw(); });
      row.appendChild(inp); row.appendChild(rm);
      wrap.appendChild(row);
    });
    var add = document.createElement('button');
    add.type = 'button';
    add.className = 'list-add';
    add.textContent = '+ Add item';
    add.addEventListener('click', function() {
      arr.push('');
      redraw();
      var inputs = wrap.querySelectorAll('input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });
    wrap.appendChild(add);
  }
  redraw();
  return wrap;
}

// ─── PUBLISH ─────────────────────────────────────────────────────────────────
function doPublish() {
  var token = lsGet('aes_token');
  if (!token) {
    showToast('Add your GitHub token in Global \u2192 API Settings first', 'error');
    return;
  }
  var btn = document.getElementById('pub-btn');
  btn.disabled = true;
  btn.textContent = 'Publishing\u2026';
  lsSet('aes_content', JSON.stringify(_data));
  var base = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;
  var headers = { 'Accept': 'application/vnd.github+json', 'Authorization': 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28' };
  fetch(base, { headers: headers })
    .then(function(r) {
      if (r.status === 401) throw new Error('GitHub token invalid \u2014 check API Settings');
      if (!r.ok) throw new Error('Could not read content.json (' + r.status + ')');
      return r.json();
    })
    .then(function(file) {
      var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(_data, null, 2))));
      return fetch(base, {
        method: 'PUT',
        headers: Object.assign({ 'Content-Type': 'application/json' }, headers),
        body: JSON.stringify({ message: 'Update content.json via CMS', content: encoded, sha: file.sha }),
      });
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || r.status); });
      showToast('Published! Site will update in ~1 minute.', 'success');
    })
    .catch(function(err) { showToast(err.message, 'error'); })
    .finally(function() { btn.disabled = false; btn.innerHTML = '&#8593; Publish to Site'; });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var wrap = document.getElementById('toast-wrap');
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(function() { requestAnimationFrame(function() { t.classList.add('show'); }); });
  setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 300); }, 4000);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
// Script is at the bottom of <body> — DOM is ready, run directly.
if (lsGet('aes_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('editor').style.display       = 'flex';
  startEditor();
}
